<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FoodHub - Aplicativo de delivery de comida. Projeto acadêmico de Interação Humano-Computador.">
    <title>FoodHub - Delivery de Comida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Skip to main content (acessibilidade) -->
    <a href="#main-content" class="skip-link">Pular para conteúdo principal</a>

    <!-- ==================== CABEÇALHO ==================== -->
    <header class="header" role="banner">
        <div class="container">
            <h1>🍽️ FoodHub</h1>
            <p class="tagline">Sua refeição favorita em poucos cliques</p>
        </div>
    </header>

    <!-- ==================== BUSCA ==================== -->
    <section class="search-section" aria-label="Buscar restaurantes">
        <div class="container">
            <label for="busca-restaurante" class="search-label">
                Buscar restaurante:
            </label>
            <div class="search-wrapper">
                <input
                    type="text"
                    id="busca-restaurante"
                    class="search-input"
                    placeholder="Digite o nome do restaurante"
                    aria-label="Campo de busca para restaurantes"
                    onkeypress="if(event.key === 'Enter') buscarRestaurante()"
                >
                <button
                    class="search-button"
                    onclick="buscarRestaurante()"
                    aria-label="Executar busca"
                >
                    Buscar
                </button>
            </div>
        </div>
    </section>

    <!-- ==================== CATEGORIAS ==================== -->
    <section class="categories-section" aria-label="Categorias de comida">
        <div class="container">
            <h2>Categorias de comida</h2>
            <div class="categories-grid" role="tablist" aria-label="Filtrar por categoria">
                <button
                    class="category-btn"
                    onclick="filtrarPorCategoria('pizza')"
                    role="tab"
                    aria-label="Filtrar restaurantes de pizza"
                >
                    <span class="category-emoji">🍕</span>
                    <span class="category-name">Pizza</span>
                </button>
                <button
                    class="category-btn"
                    onclick="filtrarPorCategoria('burger')"
                    role="tab"
                    aria-label="Filtrar restaurantes de hambúrguer"
                >
                    <span class="category-emoji">🍔</span>
                    <span class="category-name">Hambúrguer</span>
                </button>
                <button
                    class="category-btn"
                    onclick="filtrarPorCategoria('asiatica')"
                    role="tab"
                    aria-label="Filtrar restaurantes asiáticos"
                >
                    <span class="category-emoji">🍜</span>
                    <span class="category-name">Asiática</span>
                </button>
                <button
                    class="category-btn"
                    onclick="filtrarPorCategoria('saudavel')"
                    role="tab"
                    aria-label="Filtrar restaurantes saudáveis"
                >
                    <span class="category-emoji">🥗</span>
                    <span class="category-name">Saudável</span>
                </button>
            </div>
        </div>
    </section>

    <!-- ==================== RESTAURANTES ==================== -->
    <main id="main-content" class="main-content">
        <section class="restaurants-section">
            <div class="container">
                <h2>Restaurantes disponíveis</h2>
                <div
                    id="lista-restaurantes"
                    class="restaurants-grid"
                    role="region"
                    aria-label="Lista de restaurantes"
                >
                    <!-- Restaurantes serão carregados por JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <!-- ==================== RODAPÉ ==================== -->
    <footer class="footer" role="contentinfo">
        <div class="container">
            <p>&copy; 2025 FoodHub - Projeto Acadêmico</p>
            <p>Disciplina: Interação Humano-Computador (IHC) e Experiência do Usuário (UX)</p>
            <p>Desenvolvido por alunos do 1º semestre</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cardápio de restaurantes - FoodHub Delivery">
    <title>Cardápio - FoodHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ==================== CABEÇALHO ==================== -->
    <header class="header" role="banner">
        <div class="container">
            <div class="header-top">
                <a href="index.html" class="back-button" aria-label="Voltar para página inicial">
                    ← Voltar
                </a>
                <h1>🍽️ FoodHub</h1>
            </div>
        </div>
    </header>

    <!-- ==================== INFORMAÇÕES DO RESTAURANTE ==================== -->
    <section class="restaurant-info" aria-label="Informações do restaurante">
        <div class="container">
            <h2 id="restaurant-name">Nome do Restaurante</h2>
            <p id="restaurant-description">Descrição do restaurante</p>
            <div class="restaurant-details" role="region" aria-label="Detalhes de entrega">
                <span id="delivery-time">⏱️ 30-45 min</span>
                <span id="delivery-fee">🚚 R$ 3,50</span>
                <span id="rating">⭐ 4.5</span>
            </div>
        </div>
    </section>

    <!-- ==================== CONTEÚDO PRINCIPAL ==================== -->
    <main id="main-content" class="main-content">
        <div class="container menu-layout">

            <!-- ==================== PRODUTOS ==================== -->
            <section class="products-section" aria-label="Produtos do restaurante">
                <h3>Nossos Produtos</h3>
                <div
                    id="lista-produtos"
                    class="products-grid"
                    role="region"
                    aria-label="Grade de produtos disponíveis"
                >
                    <!-- Produtos serão carregados por JavaScript -->
                </div>
            </section>

            <!-- ==================== CARRINHO (SIDEBAR) ==================== -->
            <aside class="cart-sidebar" aria-label="Resumo do carrinho de compras">
                <div class="cart-container">
                    <h3>Seu Carrinho</h3>

                    <!-- Lista de itens do carrinho -->
                    <div
                        id="cart-items"
                        class="cart-items"
                        aria-label="Itens no carrinho"
                        aria-live="polite"
                    >
                        <p class="empty-cart">Carrinho vazio</p>
                    </div>

                    <!-- Resumo com cálculo do total -->
                    <div class="cart-summary" aria-label="Cálculo do valor total">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="subtotal" aria-label="Valor do subtotal">R$ 0,00</span>
                        </div>
                        <div class="summary-row">
                            <span>Taxa de entrega:</span>
                            <span id="delivery-fee-cart" aria-label="Valor da taxa de entrega">R$ 3,50</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="total" aria-label="Valor total do pedido">R$ 0,00</span>
                        </div>
                    </div>

                    <!-- Botão para proceder com o pagamento -->
                    <button
                        class="checkout-button"
                        id="checkout-btn"
                        onclick="irParaPagamento()"
                        aria-label="Proceder para página de pagamento"
                        disabled
                    >
                        Prosseguir para Pagamento
                    </button>

                    <!-- Botão para limpar o carrinho -->
                    <button
                        class="clear-cart-button"
                        onclick="limparCarrinho()"
                        aria-label="Limpar todos os itens do carrinho"
                    >
                        Limpar Carrinho
                    </button>
                </div>
            </aside>

        </div>
    </main>

    <!-- ==================== RODAPÉ ==================== -->
    <footer class="footer" role="contentinfo">
        <div class="container">
            <p>&copy; 2025 FoodHub - Projeto Acadêmico</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
